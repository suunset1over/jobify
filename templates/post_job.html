{% extends 'base.html' %}
{% block title %}
  {{ offer and 'Edit' or 'Post a' }} Job Offer
{% endblock %}

{% block content %}
<h2 class="mb-4">{{ offer and 'Edit' or 'Post a' }} Job Offer</h2>

<form method="post"
      class="mx-auto"
      style="max-width:600px;"
      action="{{ offer
                and url_for('edit_job', offer_id=offer.id)
                or url_for('post_job') }}">

  <!-- ─── LOCATION PICKER ───────────────────────── -->
  <div class="mb-3">
    <label class="form-label">Exact Location (click on map)</label>
    <div id="location-picker" style="height:300px; border:1px solid #ccc;"></div>
    <input type="hidden" id="latitude"  name="latitude"  value="{{ offer.latitude or '' }}">
    <input type="hidden" id="longitude" name="longitude" value="{{ offer.longitude or '' }}">
  </div>

  <!-- ─── JOB DETAILS ────────────────────────────── -->
  <div class="mb-3">
    <label class="form-label">Title</label>
    <input type="text" name="title" class="form-control" required
           value="{{ offer.title if offer else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Description</label>
    <textarea name="description" class="form-control" rows="4" required>{{ offer.description if offer else '' }}</textarea>
  </div>

  <div class="mb-3">
    <label class="form-label">Required Skills (comma-separated)</label>
    <input type="text" name="required_skills" class="form-control" required
           value="{{ offer.required_skills if offer else '' }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Minimum Experience (years)</label>
    <input type="number" name="min_experience" class="form-control" min="0" required
           value="{{ offer.min_experience if offer else 0 }}">
  </div>

  <div class="mb-3">
    <label class="form-label">Education Required</label>
    <input type="text" name="education_required" class="form-control" required
           value="{{ offer.education_required if offer else '' }}">
  </div>

  <div class="row g-2 mb-4">
    <div class="col-md-6">
      <label class="form-label">Country</label>
      <input type="text" name="country" class="form-control" required
             value="{{ offer.country if offer else '' }}">
    </div>
    <div class="col-md-6">
      <label class="form-label">City</label>
      <input type="text" name="city" class="form-control" required
             value="{{ offer.city if offer else '' }}">
    </div>
    <div class="col-12">
      <label class="form-label">Category</label>
      <select name="category" class="form-select">
        {% for c in categories %}
          <option value="{{ c }}" {% if offer and offer.category==c %}selected{% endif %}>
            {{ c }}
          </option>
        {% endfor %}
      </select>
    </div>
  </div>

  <button type="submit" class="btn btn-success w-100">
    {{ offer and 'Update Job' or 'Post Job' }}
  </button>
</form>

{# ─── Leaflet CSS & JS ─────────────────────────── #}
<link
  rel="stylesheet"
  href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
  // 1) set initial view: if editing with coords, center on them; else on Romania
  const initLat = {{ offer.latitude or 45.9432 }};
  const initLng = {{ offer.longitude or 24.9668 }};
  const initZoom = {{ offer.latitude and 12 or 6 }};
  const cityCoords = {
    "bucharest":[44.4268,26.1025],"bucuresti":[44.4268,26.1025],
    "cluj-napoca":[46.7712,23.6236],"cluj":[46.7712,23.6236],
    "timisoara":[45.7489,21.2087],"brasov":[45.6579,25.6012],
    "iasi":[47.1585,27.6014],"constanta":[44.1598,28.6348],
    "galati":[45.4353,28.0079],"oradea":[47.0465,21.9189],
    "sibiu":[45.7983,24.1256],"craiova":[44.3302,23.7949],
    "berlin":[52.52,13.405],"paris":[48.8566,2.3522],
    "london":[51.5072,-0.1276],"madrid":[40.4168,-3.7038],
    "barcelona":[41.3874,2.1686],"rome":[41.9028,12.4964],
    "milan":[45.4642,9.19],"vienna":[48.2082,16.3738],
    "amsterdam":[52.3676,4.9041],"brussels":[50.8503,4.3517],
    "warsaw":[52.2297,21.0122],"krakow":[50.0647,19.945],
    "prague":[50.0755,14.4378],"budapest":[47.4979,19.0402],
    "sofia":[42.6977,23.3219],"athens":[37.9838,23.7275],
    "dublin":[53.3498,-6.2603],"lisbon":[38.7223,-9.1393],
    "stockholm":[59.3293,18.0686],"oslo":[59.9139,10.7522],
    "copenhagen":[55.6761,12.5683],"helsinki":[60.1699,24.9384],
    "zurich":[47.3769,8.5417],"munich":[48.1351,11.582],
    "hamburg":[53.5511,9.9937],"frankfurt":[50.1109,8.6821],
    "lyon":[45.764,4.8357],"belgrade":[44.7866,20.4489]
  };

  const map = L.map('location-picker').setView([initLat, initLng], initZoom);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);

  // 2) marker holder
  let marker = null;
  const cityInput = document.querySelector('[name="city"]');
  const statusBox = document.getElementById('locationStatus');

  // 3) if we have saved coords, render the marker
  {% if offer and offer.latitude and offer.longitude %}
    marker = L.marker([initLat, initLng]).addTo(map);
  {% endif %}

  // 4) clicking on the map adds or moves marker, updates hidden inputs
  map.on('click', e => {
    const { lat, lng } = e.latlng;
    if (marker) {
      marker.setLatLng(e.latlng);
    } else {
      marker = L.marker(e.latlng).addTo(map);
    }

    document.getElementById('latitude').value  = lat.toFixed(6);
    document.getElementById('longitude').value = lng.toFixed(6);
    statusBox.textContent = 'Manual marker selected.';
  });

  function normalizeCity(value) {
    return (value || '').trim().toLowerCase()
      .replace(/[șş]/g, 's').replace(/[țţ]/g, 't')
      .replace(/[ăâ]/g, 'a').replace(/[î]/g, 'i')
      .replace(/\s+/g, ' ');
  }

  function setMarker(lat, lng, label) {
    const point = [lat, lng];
    if (marker) marker.setLatLng(point);
    else marker = L.marker(point).addTo(map);
    map.setView(point, 11);
    document.getElementById('latitude').value = Number(lat).toFixed(6);
    document.getElementById('longitude').value = Number(lng).toFixed(6);
    statusBox.textContent = label;
  }

  function updateSmartLocation() {
    const key = normalizeCity(cityInput.value);
    const coords = cityCoords[key];
    if (!coords) {
      statusBox.textContent = key ? 'City is not in the local map yet. Click the map to set it manually.' : 'Enter a city to preview the marker.';
      return;
    }
    setMarker(coords[0], coords[1], `Marker placed automatically for ${cityInput.value}.`);
  }

  cityInput.addEventListener('input', updateSmartLocation);
  cityInput.addEventListener('change', updateSmartLocation);
  if (!document.getElementById('latitude').value && cityInput.value) updateSmartLocation();
</script>
{% endblock %}
