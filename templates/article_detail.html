{% extends "base.html" %}
{% block title %}{{ article.title }}{% endblock %}
{% block content %}
<div class="container py-4">
  <h1>{{ article.title }}</h1>
  <p class="text-muted">{{ article.created_at.strftime('%Y-%m-%d') }}</p>
  {% if article.image_url %}
    <img src="{{ article.image_url }}" class="img-fluid mb-3">
  {% endif %}
  <p>{{ article.body.replace('\n', '<br>')|safe }}</p>
  <a href="{{ url_for('article_list') }}" class="btn btn-secondary">← Back to Articles</a>
</div>
{% endblock %}
