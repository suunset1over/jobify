{% extends "base.html" %}
{% block title %}{{ news.title }}{% endblock %}
{% block content %}
<div class="container py-4">
  <h1>{{ news.title }}</h1>
  <p class="text-muted">{{ news.created_at.strftime('%Y-%m-%d') }}</p>
  {% if news.image_url %}
    <img src="{{ news.image_url }}" class="img-fluid mb-3">
  {% endif %}
 <p>{{ news.body.replace('\n', '<br>')|safe }}</p>
  <a href="{{ url_for('news_list') }}" class="btn btn-secondary">← Back to News</a>
</div>
{% endblock %}
